name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
        with:
          submodules: recursive

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake golang rustc python3

      - name: Build NAAb
        run: bash build.sh

      - name: Run Tests
        run: ./naab/build/naab-lang verify_vigilant_v7.naab

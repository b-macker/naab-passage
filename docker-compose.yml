version: '3.8'

services:
  passage:
    build: .
    ports:
      - "8091:8091"
    volumes:
      - ./config:/opt/naab-passage/config:ro
      - ./logs:/opt/naab-passage/logs
    environment:
      - PASSAGE_MODE=production
    cap_add:
      - SYS_ADMIN  # Required for network namespaces (unshare -n)
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8091/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
